# Site statique (React/Vite). Renomme "app" ou : fly launch
# Build : l’URL de l’API doit correspondre à ton app Fly Django (voir DEPLOY.md)

app = "portfolio-web"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[build.args]
  VITE_CONTACT_API_URL = "https://portfolio-api.fly.dev/api/contact/"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
